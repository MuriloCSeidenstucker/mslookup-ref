repos:
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        args:
          [
            "-rn",
            "-sn",
            "--load-plugins=pylint.extensions.docparams",
          ]
      - id: task-test
        name: task-test
        entry: task
        language: system
        args: ["pre_test"]
